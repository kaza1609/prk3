name: CI/CD Pipeline

on:
  push:
    branches:
      - master # Или укажите вашу основную ветку

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.8" # Укажите нужную версию Python

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run tests
        run: |
          python -m unittest discover -s tests

  deploy:
    runs-on: self-hosted
    needs: test
    if: success() # Деплой выполняется только при успешном прохождении тестов
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Deploy to production
        run: |
        cd /home/ds/Desktop/prk3
        git pull
        pip install pytest
        python3 main.py
        

